spring:
  # H2 Database 설정
  application:
    name: blog

  datasource:
    url: jdbc:h2:mem:testdb # H2 DB연결 주소 (In-Memory Mode)
    driver-class-name: org.h2.Driver
    username: yunjin      # H2 DB 접속 ID (사용자 지정)
    password: yunjin00     # H2 DB 접속 PW (사용자 지정)

  # H2 Console 설정
  h2:
    console:
      enabled: true     # H2 Console 사용 여부
      path: /h2-console     # H2 Console 접속 주소

  # JPA 설정
  jpa:
    hibernate:
      ddl-auto: update      # DB 초기화 전략 (none, create, create-drop, update, validate)
    show-sql: true          # 쿼리 로그 출력
    properties:
      hibernate:
        format_sql: true    # 쿼리 로그 포맷 (정렬)